name: 清理 GitHub Actions 记录

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: actions-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 清理工作流运行记录，只保留最新 4 个
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP_LATEST: 4
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          echo "🧹 开始清理 GitHub Actions 运行记录..."
          echo "📌 仅保留最新 ${KEEP_LATEST} 个已完成的工作流运行记录"

          kept=0
          deleted=0
          skipped=0

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs?per_page=100" \
            --paginate \
            --jq '.workflow_runs[] | [.created_at, .id, .name, .status, .conclusion] | @tsv' |
          sort -r |
          while IFS=$'\t' read -r CREATED_AT RUN_ID NAME STATUS CONCLUSION; do
            if [ -z "$RUN_ID" ]; then
              continue
            fi

            if [ "$RUN_ID" = "$CURRENT_RUN_ID" ]; then
              echo "⏩ 跳过当前正在运行的清理任务: $RUN_ID | $NAME"
              skipped=$((skipped + 1))
              continue
            fi

            if [ "$STATUS" != "completed" ]; then
              echo "⏩ 跳过未完成记录: $RUN_ID | $NAME | $STATUS"
              skipped=$((skipped + 1))
              continue
            fi

            if [ "$kept" -lt "$KEEP_LATEST" ]; then
              kept=$((kept + 1))
              echo "✅ 保留第 ${kept} 个最新记录: $RUN_ID | $NAME | $CREATED_AT | $CONCLUSION"
              continue
            fi

            echo "🗑️ 删除旧记录: $RUN_ID | $NAME | $CREATED_AT | $CONCLUSION"
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/runs/${RUN_ID}" || true
            deleted=$((deleted + 1))
          done

          echo "✅ 清理完成"
