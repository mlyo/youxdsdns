name: Cloudflare DNS 自动同步

on:
  workflow_run:
    workflows: ["ProxyIP 自动采集"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-dns-sync
  cancel-in-progress: true

jobs:
  sync-dns:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: 检出代码库
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: 确保使用最新仓库内容
        run: |
          git pull --ff-only origin "${{ github.event.repository.default_branch }}"

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 执行 Cloudflare DNS 同步
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          python bestdomain.py \
            --domains "cle.us.ci" \
            --proxied "false" \
            --min-ips 2 \
            --max-records 15 \
            --ttl 60 > dns_sync.log

          cat dns_sync.log

      - name: 发送 Telegram 运维报告
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_ID" ]; then
            echo "未配置 Telegram 凭据，跳过发送通知。"
            exit 0
          fi

          REPORT="🤖 <b>Cloudflare DNS 同步报告</b>%0A------------------------%0A"
          CHANGES=$(grep -E '🌐|🧪|🚨|❌|⚠️' dns_sync.log || echo "DNS 记录无变化")

          MESSAGE="${REPORT}${CHANGES}"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"